# Full stack:   docker compose up --build      → app at http://localhost:3001
# DB only:      docker compose up -d mongo      → Mongo for host-run dev/tests
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    depends_on:
      - mongo
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/bloglist
      # Uses your shell/.env SECRET if set, else a clearly-insecure local default.
      SECRET: ${SECRET:-dev-only-insecure-secret-change-me}

volumes:
  mongo-data:
